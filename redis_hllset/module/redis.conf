# Redis configuration for HLLSet module
#
# This config loads the HLLSet module and other optional modules

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Persistence
save 900 1
save 300 10
save 60 10000
dir /data

# Memory
maxmemory 256mb
maxmemory-policy volatile-lru

# Logging
loglevel notice
logfile ""

# Module loading
# HLLSet native module (Rust)
loadmodule /usr/local/lib/redis/modules/libredis_hllset.so

# Optional: Roaring Bitmaps (for compatibility with Lua implementation)
# loadmodule /usr/local/lib/redis/modules/libredis-roaring.so

# Optional: RediSearch
# loadmodule /usr/local/lib/redis/modules/redisearch.so

# Optional: RedisGraph
# loadmodule /usr/local/lib/redis/modules/redisgraph.so

# Lua scripting
lua-time-limit 5000

# Performance tuning
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
